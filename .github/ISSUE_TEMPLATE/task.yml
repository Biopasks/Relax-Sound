name: Task / Chore
description: A specific, well-defined task — refactoring, cleanup, dependency updates, small improvements
title: "[Task]: "
labels: ["task"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## ✅ Task / Chore — RelaxSound

        Small, focused tasks that don't fit as bug reports or feature requests.

  - type: dropdown
    id: type
    attributes:
      label: Task Type
      options:
        - Refactoring / code cleanup
        - Dependency update
        - Test improvement / coverage
        - Build / tooling
        - CI / CD
        - Accessibility (a11y)
        - Internationalization (i18n)
        - Documentation
        - Infrastructure / DevOps
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be done?
      placeholder: "Update React from 18.2.0 to 18.3.1 and verify all components still work correctly."
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know when this is done?
      placeholder: |
        - [ ] Dependencies updated in package.json
        - [ ] All tests pass
        - [ ] App builds without warnings
        - [ ] No breaking changes in component behavior
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links, references, related issues
      placeholder: "See #45 for the original reason we pinned React to 18.2.0."

  - type: input
    id: effort
    attributes:
      label: Estimated Effort
      description: How long do you think this will take?
      placeholder: e.g., 30 minutes, 2 hours, 1 day
