name: Documentation
description: Report issues or suggest improvements to RelaxSound documentation
title: "[Docs]: "
labels: ["documentation"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## 📖 Documentation — RelaxSound

        Help us improve our documentation! Whether it's a missing guide, unclear explanation, or typo.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched [existing issues](https://github.com/sanot-tech/RelaxSound/issues) and this is not a duplicate
          required: true
        - label: I have reviewed the [current documentation](https://github.com/sanot-tech/RelaxSound#readme)
          required: true

  - type: dropdown
    id: type
    attributes:
      label: Documentation Type
      options:
        - Missing documentation
        - Inaccurate / outdated
        - Typo / grammar
        - Unclear explanation
        - Missing examples / screenshots
        - Translation
        - Other
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - README
        - CONTRIBUTING.md
        - Code comments
        - API / integration docs
        - Setup / installation guide
        - Mobile (Capacitor) docs
        - In-app help / tooltips
        - Wiki
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is wrong or missing?
      placeholder: "The README does not explain how to configure custom sound packs..."
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Change
      description: What should the documentation say instead?
      placeholder: "Add a section under 'Advanced Usage' explaining the custom sounds directory structure..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Links, screenshots, or references
